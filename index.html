<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesium CCTV 多邊形敷貼 (修正版)</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        #cesiumContainer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <!-- 增加 cache-control 的參數，強迫瀏覽器每次都拿最新的影像 -->
    <img id="mjpeg-stream" src="https://tcnvr8.taichung.gov.tw/d9216d9c" crossorigin="anonymous" style="display:none;">
    <canvas id="video-canvas" width="480" height="640" style="display:none;"></canvas>

    <script>
        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayer: new Cesium.ImageryLayer(new Cesium.WebMapTileServiceImageryProvider({
                url : 'https://wmts.nlsc.gov.tw/wmts',
                layer : 'PHOTO2',
                style : 'default',
                format : 'image/png',
                tileMatrixSetID : 'GoogleMapsCompatible',
                maximumLevel: 19,
                credit: '內政部國土測繪中心'
            })),
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            navigationHelpButton: false,
            sceneModePicker: false,
            animation: false, 
            timeline: false   
        });

        const img = document.getElementById('mjpeg-stream');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // 持續更新 Canvas 的渲染循環
        function renderFrame() {
            // 每次重新畫圖前，清空 Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            // 旋轉與位移邏輯：逆時針轉 90 度
            // 因為轉動後坐標系會改變，所以先移軸心再轉
            ctx.translate(0, canvas.width); 
            ctx.rotate(-90 * Math.PI / 180);
            
            // 繪製影像 (注意這裡的寬高比例調整)
            if (img.complete) {
                ctx.drawImage(img, 0, 0, 640, 480);
            }
            ctx.restore();
            
            requestAnimationFrame(renderFrame);
        }
        renderFrame(); 

        const cctvPolygon = viewer.entities.add({
            polygon: {
                hierarchy: Cesium.Cartesian3.fromDegreesArrayHeights([
                     120.693041, 24.134783, 4.81,
                     120.693051, 24.134874, 4.81,
                     120.693051, 24.134874, 0,
                     120.693041, 24.134783, 0
                ]),
                perPositionHeight: true,
                material: new Cesium.ImageMaterialProperty({
                    image: new Cesium.CallbackProperty(function() {
                        return canvas;
                    }, false),
                    transparent: false
                })
            }
        });

        viewer.flyTo(cctvPolygon, {
            offset: new Cesium.HeadingPitchRange(
                6, 
                Cesium.Math.toRadians(0),
                100
            )
        });
    </script>
</body>
</html>
